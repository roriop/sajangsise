name: Collect KAMIS prices

# 매일 18:00 KST (= 09:00 UTC) — KAMIS 당일 가격 갱신 이후.
# 수동 실행도 가능(workflow_dispatch).
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: '과거 N일 일괄 수집(1회성). 비우면 어제 1일치만.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Collect prices
        env:
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_API_ID: ${{ secrets.KAMIS_API_ID }}
        run: |
          if [ -n "${{ github.event.inputs.backfill }}" ]; then
            node scripts/collect-prices.mjs --backfill "${{ github.event.inputs.backfill }}"
          else
            node scripts/collect-prices.mjs
          fi

      - name: Commit new data
        run: |
          git config user.name  "kamis-bot"
          git config user.email "kamis-bot@users.noreply.github.com"
          if git diff --quiet -- data/prices.jsonl; then
            echo "변경 없음 — 커밋 생략"
          else
            git add data/prices.jsonl
            git commit -m "data: KAMIS 가격 수집 $(date -u +%Y-%m-%d)"
            git push
          fi
